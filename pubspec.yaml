name: redcross_branch
description: Myanmar Red Cross Branch Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.0

  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  flutter_slidable: ^3.0.1
  badges: ^3.1.2
  dotted_border: ^2.1.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^1.3.2

  # Storage & Database
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Supabase
  supabase_flutter: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  

  # PDF & Excel
  pdf: ^3.10.7
  printing: ^5.12.0
  excel: ^4.0.2

  # File handling
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  open_file: ^3.3.2
  permission_handler: ^11.2.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  crypto: ^3.0.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/mock/
  # Padauk (Burmese font) — add font files to assets/fonts/ then uncomment below
  # fonts:
  #   - family: Padauk
  #     fonts:
  #       - asset: assets/fonts/Padauk-Regular.ttf
  #       - asset: assets/fonts/Padauk-Bold.ttf
  #         weight: 700
